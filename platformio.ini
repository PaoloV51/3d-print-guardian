[platformio]
default_envs = guardian-n16r8
boards_dir = boards

[env:guardian-n16r8]
platform = espressif32 @ 6.12.0
board = esp32-s3-devkitc-1-n16r8
framework = arduino
monitor_speed = 115200

; ESP32-S3 N16R8: 16 MB flash + OPI PSRAM.
board_build.arduino.memory_type = qio_opi
board_build.partitions = partitions_16mb_ota.csv
board_build.flash_mode = qio
board_build.flash_size = 16MB
board_build.psram_type = opi
board_upload.flash_size = 16MB

; USB host, CDC behavior and PSRAM are explicit for reproducible builds.
build_flags = 
    -D ARDUINO_USB_MODE=1
    -D ARDUINO_USB_CDC_ON_BOOT=0
    -D BOARD_HAS_PSRAM

; Pinned dependencies: do not use floating ranges in production firmware.
lib_deps =
    bblanchon/ArduinoJson @ 6.21.5
    links2004/WebSockets @ 2.7.3

[env:ota]
extends = env:guardian-n16r8
upload_protocol = espota
upload_port = impresoras3d.local
; The firmware enforces GUARDIAN_ARDUINO_OTA_PASSWORD from include/secrets.h.
; Use docs/security-build.md for authenticated OTA upload commands.
upload_flags = --port=3232
